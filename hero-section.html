<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Hero Section</title>
  <style>
    :root {
      --bg: #0b1020;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text: #eef2ff;
      --muted: #c7d2fe;
      --primary: #7c3aed;
      --accent: #06b6d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(124, 58, 237, 0.25), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.2), transparent 40%),
        var(--bg);
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 1rem;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
      pointer-events: none;
    }

    .hero {
      width: min(920px, 100%);
      border-radius: 24px;
      padding: clamp(1.5rem, 5vw, 4rem);
      text-align: center;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      animation: cardEnter 700ms ease-out both;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5.2vw, 4rem);
      line-height: 1.2;
      margin-bottom: 0.9rem;
      font-weight: 800;
      background: linear-gradient(120deg, #ffffff 20%, #93c5fd 45%, #c4b5fd 70%, #22d3ee 95%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleIn 900ms ease-out both, gradientShift 6s linear infinite;
    }

    .hero p {
      color: var(--muted);
      max-width: 60ch;
      margin: 0 auto 1.5rem;
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      opacity: 0;
      animation: fadeUp 900ms ease-out 250ms forwards;
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 900ms ease-out 400ms forwards;
    }

    .btn {
      text-decoration: none;
      padding: 0.78rem 1.2rem;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
      min-width: 145px;
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), #5b21b6);
      box-shadow: 0 10px 22px rgba(124, 58, 237, 0.35);
    }

    .btn-secondary {
      color: #e2e8f0;
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary:hover {
      box-shadow: 0 14px 26px rgba(124, 58, 237, 0.45);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    @keyframes cardEnter {
      from { transform: translateY(24px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes titleIn {
      from { transform: translateY(20px); opacity: 0; filter: blur(3px); }
      to { transform: translateY(0); opacity: 1; filter: blur(0); }
    }

    @keyframes fadeUp {
      from { transform: translateY(14px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @media (max-width: 600px) {
      .hero { border-radius: 18px; }
      .btn { width: 100%; }
      .hero-actions { gap: 0.55rem; }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="Hero section">
    <h1>صمّم واجهتك القادمة بأسلوب عصري وأنيق</h1>
    <p>
      Hero Section بخلفية شبكة، نص متدرّج (Gradient Text)، وتأثيرات دخول ناعمة تمنح الصفحة إحساساً حديثاً واحترافياً.
    </p>
    <div class="hero-actions">
      <a href="#" class="btn btn-primary">ابدأ الآن</a>
      <a href="#" class="btn btn-secondary">اكتشف المزيد</a>
    </div>
  </section>
</body>
</html>
